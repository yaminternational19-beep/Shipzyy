<!DOCTYPE html>
<html>
<head>
    <title>Razorpay Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #3399cc; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 30px; font-family: monospace; white-space: pre-wrap; background: #f4f4f4; padding: 20px; border-radius: 5px; text-align: left; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Test Razorpay Payment</h2>
    <button id="rzp-button1">Pay ₹20872 Now</button>
    <div id="result">The success payload will appear here after payment...</div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        var options = {
            "key": "rzp_test_SbNfB0kgGQSMSN", // Your Razorpay Test Key ID
            "amount": "2087200", // Amount is in currency subunits (paise) -> 20872 * 100
            "currency": "INR",
            "name": "Shipzyy Test",
            "description": "Test Transaction",
            "order_id": "order_SlygexcuMwkJdx", // The order ID from your Postman response
            "handler": function (response){
                // This function runs automatically on a successful payment!
                document.getElementById('result').innerText = JSON.stringify({
                    "razorpay_order_id": response.razorpay_order_id,
                    "razorpay_payment_id": response.razorpay_payment_id,
                    "razorpay_signature": response.razorpay_signature
                }, null, 4);
                
                alert("Payment Successful! Copy the JSON below into Postman.");
            },
            "prefill": {
                "name": "Praveen Reddy",
                "email": "test@example.com",
                "contact": "9999999999"
            },
            "theme": {
                "color": "#3399cc"
            }
        };
        var rzp1 = new Razorpay(options);
        
        rzp1.on('payment.failed', function (response){
            alert("Payment Failed: " + response.error.description);
        });

        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
</body>
</html>
